aid: mkdocs
name: MkDocs
description: >-
  MkDocs is a fast, simple, and beautiful static site generator designed for building
  project documentation from Markdown source files. Written in Python, it reads a
  single YAML configuration file (mkdocs.yml) and converts a directory of Markdown
  documents into a self-contained static HTML site. MkDocs supports multiple built-in
  themes (mkdocs, readthedocs), a rich plugin ecosystem via Python entry points, live-reloading
  development server, and one-command deployment to GitHub Pages.
